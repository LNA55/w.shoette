<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cahier des charges — What works for me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --c-500:#118996;--c-100:#C5E3E5;--c-50:#E8F3F4;--c-700:#0B545C;--c-800:#073A40;--c-900:#042227;
    --ink:#1b1417;--muted:#7a7075;--line:#ece7e9;
    --font-body:'Inter',system-ui,sans-serif;--font-display:'Space Grotesk','Inter',sans-serif;
    --maxw:880px;
  }
  html{font-size:16px;-webkit-text-size-adjust:100%}
  body{font-family:var(--font-body);color:var(--ink);background:#fff;line-height:1.65;-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 12px}
  .topbar-inner{max-width:var(--maxw);margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:var(--font-display);font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--c-500);box-shadow:0 0 0 3px var(--c-100);flex:none}
  .dl{display:inline-flex;align-items:center;gap:7px;background:var(--c-500);color:#fff;text-decoration:none;font-weight:700;font-size:.85rem;padding:9px 14px;border-radius:999px;white-space:nowrap}
  .dl:hover{background:var(--c-600,#0E6E78)}
  .dl svg{width:15px;height:15px}
  .page{max-width:var(--maxw);margin:0 auto;padding:30px 18px 90px}
  .md h1{font-family:var(--font-display);font-size:clamp(1.7rem,4vw,2.4rem);font-weight:700;letter-spacing:-.03em;line-height:1.12;margin:0 0 14px}
  .md h2{font-family:var(--font-display);font-size:1.35rem;font-weight:700;margin:38px 0 12px;padding-top:18px;border-top:1px solid var(--line);letter-spacing:-.02em}
  .md h3{font-family:var(--font-display);font-size:1.08rem;font-weight:700;margin:24px 0 8px}
  .md p{margin:10px 0}
  .md ul,.md ol{margin:10px 0 10px 22px}
  .md li{margin:5px 0}
  .md a{color:var(--c-700);text-decoration:underline}
  .md strong{font-weight:700}
  .md code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;background:var(--c-50);color:var(--c-800);padding:1px 6px;border-radius:6px}
  .md pre{background:#0c2a2e;color:#dfeff0;border-radius:12px;padding:16px 18px;overflow:auto;margin:14px 0;font-size:.82rem;line-height:1.5}
  .md pre code{background:none;color:inherit;padding:0;font-size:inherit}
  .md blockquote{border-left:3px solid var(--c-200,#93C9CD);background:var(--c-50);padding:10px 16px;border-radius:0 10px 10px 0;margin:14px 0;color:var(--c-800)}
  .md table{border-collapse:collapse;width:100%;margin:14px 0;font-size:.9rem;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  .md th{background:var(--c-50);font-weight:700;white-space:nowrap}
  .md hr{border:none;border-top:1px solid var(--line);margin:30px 0}
  .loading{color:var(--muted);padding:40px 0;text-align:center}
  .badge{display:inline-block;background:var(--c-50);color:var(--c-700);border:1px solid var(--c-100);border-radius:999px;padding:4px 12px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
  /* Footer + sélecteur de langue */
  .foot{border-top:1px solid var(--line);margin-top:48px}
  .foot-inner{max-width:var(--maxw);margin:0 auto;padding:22px 18px calc(40px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .foot-lang-lbl{color:var(--muted);font-size:.82rem;font-weight:600}
  .lang-switch{display:inline-flex;background:var(--c-50);border-radius:999px;padding:4px;gap:4px}
  .lang-btn{border:none;background:transparent;color:var(--c-700);font-weight:700;font-size:.85rem;padding:8px 16px;border-radius:999px;cursor:pointer}
  .lang-btn.on{background:#fff;color:var(--c-700);box-shadow:0 0 0 1px var(--c-100),0 4px 12px -6px rgba(0,0,0,.22)}
  .soon{text-align:center;padding:64px 18px;color:var(--muted)}
  .soon-flag{font-size:2.4rem;margin-bottom:12px}
  .soon p{margin:8px 0;font-size:1.05rem}
  .soon-sub a{color:var(--c-700);font-weight:700;text-decoration:none}
</style>
</head>
<body>
<nav class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="dot"></span>Cahier des charges</div>
    <a class="dl" id="dlBtn" href="cahier-des-charges.md" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
      Télécharger le .md
    </a>
  </div>
</nav>
<div class="page">
  <div class="badge">Spécification · optimisée pour Claude</div>
  <div id="md" class="md"><div class="loading">Chargement du cahier des charges…</div></div>
</div>

<footer class="foot">
  <div class="foot-inner">
    <span class="foot-lang-lbl">Langue / Language</span>
    <div class="lang-switch">
      <button class="lang-btn on" data-lang="fr">Français</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var FILES = { fr:'cahier-des-charges.md', en:'cahier-des-charges.en.md' };
  var EN_SOON = 'The English version is coming soon — the specification is still being finalized.';
  var mdEl = document.getElementById('md'), dlBtn = document.getElementById('dlBtn');
  function renderMd(txt){
    mdEl.innerHTML = window.marked ? (marked.parse ? marked.parse(txt) : marked(txt))
      : '<pre>'+txt.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];})+'</pre>';
  }
  function setLang(lang){
    document.documentElement.lang = lang;
    var btns = document.querySelectorAll('.lang-btn');
    for (var i=0;i<btns.length;i++){ btns[i].classList.toggle('on', btns[i].getAttribute('data-lang')===lang); }
    mdEl.innerHTML = '<div class="loading">…</div>';
    fetch(FILES[lang], {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw 0; return r.text(); })
      .then(function(txt){ renderMd(txt); dlBtn.style.display=''; dlBtn.setAttribute('href', FILES[lang]); })
      .catch(function(){
        // Pas encore de traduction : on affiche un message, sans casser le FR.
        mdEl.innerHTML = '<div class="soon"><div class="soon-flag">🇬🇧</div><p>'+EN_SOON+'</p>'+
          '<p class="soon-sub"><a href="#" data-lang="fr">← Revenir au français</a></p></div>';
        dlBtn.style.display='none';
      });
  }
  document.addEventListener('click', function(ev){
    var b = ev.target.closest ? ev.target.closest('[data-lang]') : null;
    if(!b) return; ev.preventDefault(); setLang(b.getAttribute('data-lang'));
  });
  setLang('fr');
</script>
</body>
</html>
